<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浅绿艺廊 · 立体投稿墙</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #d9f0d0;  /* 柔和浅绿背景，整体包裹 */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* 核心白色立体卡片 — 3D立体底 + 阴影 */
        .card {
            max-width: 780px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 36px 36px 32px 32px;
            padding: 40px 42px 50px 42px;
            box-shadow: 
                0 30px 40px -15px rgba(60, 80, 30, 0.35),      /* 底部大面积柔影 — 立体悬浮 */
                0 60px 50px -30px rgba(40, 70, 20, 0.4),        /* 更深远的重影，制造立体纵深 */
                0 12px 25px -8px rgba(0, 0, 0, 0.25),           /* 中层过渡阴影 */
                inset 0 -3px 8px rgba(0,0,0,0.02),              /* 微弱内凹阴影，强化立体底边 */
                inset 0 8px 12px rgba(255, 255, 255, 0.6);      /* 顶部内发光，让白色更立体 */
            
            /* 3D 底部加厚效果 (模拟立体底层) */
            position: relative;
            border: 1px solid rgba(200, 220, 180, 0.4);
             border-top: 2px solid rgba(255, 255, 255, 0.9);
            transform: perspective(1600px) rotateX(0.8deg) translateY(-3px);
            transition: transform 0.2s ease;
        }

        /* 进一步强化立体感的假底边——利用伪元素制作厚底座 */
        .card::after {
            content: "";
            position: absolute;
            bottom: -12px;
            left: 20px;
            right: 20px;
            height: 28px;
            background: rgba(180, 200, 150, 0.25);
            filter: blur(14px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.8;
            box-shadow: 0 18px 25px 8px rgba(70, 100, 40, 0.4);
        }

        /* 顶部圆形头像区域 */
        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 36px;
            margin-top: -10px;
        }

        /* 你提供的图片——以圆形展示 */
        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 18px 30px -6px rgba(55, 85, 35, 0.5),
                        0 0 0 5px rgba(235, 255, 220, 0.7);   /* 浅色光晕，与背景呼应 */
            border: 3px solid white;
            transition: transform 0.3s ease;
            display: block;
            background: #e2f0da;  /* 图片未加载时的占底色 */
            /* 图片地址：使用一个高质友好的占位图，同时也是你要求的“这张图片” */
            /* 但为了展示你想要的图片，我们放置一张与“作品上传/评论”风格匹配的艺术感图像 */
            /* 你可以随时替换src为你的图片 */
            src: "https://api.dicebear.com/9.x/glass/svg?seed=GreenThumb&backgroundColor=d1e9c9&scale=110&radius=50";
            /* 上面用svg占位确保圆形成型。但为更自然，下面用unsplash风景头像，同时保留svg占位符，但img会覆盖src */
        }

        /* 为保证呈现你想要的图片，同时纯本地演示优雅，用一朵绿色植物头像 */
        /* 如果希望强制用你的图片，只需替换src链接。现在先使用一个艺术头像，且完全圆形。 */
        .avatar-circle {
            src: url('https://images.unsplash.com/photo-1536329583-40a8ea002c33?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D'); 
            /* 上面是绿叶植物意象，但如果不可访问，还可以用下面备选 */
            onerror: "this.onerror=null; this.src='https://api.dicebear.com/9.x/shapes/svg?seed=leaf&backgroundColor=a8d5a2&shapeColor=6a9c5e';"
        }

        /* 但onerror在style无效，用js特性确保图片显示，但最稳妥在img标签用data:或者fallback。为了可靠性，我们使用img内联js+备用 */
        /* 这里手动在html里放置img并带上备用逻辑，保持圆形 */

        /* 卡片标题 */
        .card h1 {
            font-size: 2.2rem;
            font-weight: 500;
            color: #2b4b2b;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(160, 190, 140, 0.2);
            border-bottom: 2px dashed #b8d9aa;
            padding-bottom: 20px;
        }

        /* 作品/评论上传表单 */
        .upload-area {
            background: #f6fff0;
            border-radius: 30px;
             padding: 26px 28px;
            margin: 18px 0 28px 0;
            box-shadow: inset 0 4px 8px rgba(140, 160, 120, 0.15), 0 8px 18px rgba(100, 130, 70, 0.1);
            border: 1px solid #cbe5bc;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 1rem;
            font-weight: 600;
            color: #3b5e2b;
            margin-bottom: 8px;
            margin-left: 6px;
            letter-spacing: 0.3px;
        }

        .input-field {
            width: 100%;
            padding: 16px 20px;
            background: white;
            border: 2px solid #cde2c0;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: 0 6px 10px rgba(0,0,0,0.02), inset 0 2px 4px rgba(130,150,100,0.1);
            resize: vertical;
        }

        .input-field:focus {
            border-color: #7fb07f;
            box-shadow: 0 0 0 4px rgba(140, 190, 120, 0.3), 0 8px 12px rgba(50, 70, 20, 0.1);
        }

        textarea.input-field {
            min-height: 100px;
            border-radius: 32px;
        }
 /* 上传作品的模拟控件 */
        .file-attach {
            background: #ecf9e5;
            border: 2px dashed #9bc18d;
            border-radius: 60px;
            padding: 14px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 6px;
        }

        .file-attach:hover {
            background: #e0f2d4;
        }

        .file-attach span {
            font-size: 1rem;
            color: #3b622b;
            font-weight: 500;
        }

        .file-attach .icon {
            font-size: 1.8rem;
            line-height: 1;
            color: #5f914a;
        }

        /* 隐藏原始input，用来触发上传 */
        #real-file-input {
            display: none;
        }

        /* 提交按钮和评论列表区域 */
        .submit-btn {
            background: #558b45;
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 16px 30px;
          border-radius: 50px;
            width: 100%;
            letter-spacing: 1px;
            box-shadow: 0 20px 25px -8px #49733e, 0 6px 0 #2c5124, 0 8px 18px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.07s linear;
            margin: 24px 0 36px 0;
            border-top: 2px solid #a9cf96;
        }

        .submit-btn:active {
            transform: translateY(6px);
            box-shadow: 0 14px 20px -8px #3f6835, 0 2px 0 #2c5124, 0 5px 12px rgba(0,0,0,0.15);
        }

        /* 评论展示区 — 显示个人评论与作品名 */
        .comment-section {
            background: rgba(230, 250, 220, 0.6);
            border-radius: 36px;
            padding: 22px 24px;
            backdrop-filter: blur(3px);
            box-shadow: inset 0 1px 6px white, 0 8px 18px rgba(60, 90, 30, 0.15);
            border: 1px solid #b7daab;
        }

        .comment-section h3 {
            color: #2c552c;
            font-weight: 500;
            font-size: 1.6rem;
            padding-left: 12px;
            border-left: 12px solid #89b67b;
            margin-bottom: 20px;
        }

        .comment-list {
            list-style: none;
            max-height: 240px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .comment-item {
            background: white;
            border-radius: 40px;
            padding: 14px 22px;
            margin-bottom: 12px;
            box-shadow: 0 5px 8px rgba(0,0,0,0.03), 0 2px 0 #d0e2c4;
            border: 1px solid #cfe5c1;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
        }

        .comment-item:hover {
            background: #fafff5;
            box-shadow: 0 8px 14px rgba(80, 120, 40, 0.15);
        }

        .comment-avatar {
            width: 46px;
            height: 46px;
            background: #b1d89b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            color: #2d5720;
            flex-shrink: 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }

        .comment-content {
            flex: 1;
        }

        .comment-title {
            font-weight: 700;
            color: #1f4a1a;
            margin-right: 10px;
            font-size: 1.05rem;
        }

        .comment-desc {
         color: #3e6034;
            word-break: break-word;
            font-size: 0.95rem;
            display: block;
        }

        .comment-meta {
            font-size: 0.8rem;
            color: #789b67;
            margin-top: 4px;
            display: flex;
            gap: 15px;
        }

        .empty-comment {
            color: #6e8f5e;
            font-style: italic;
            padding: 24px;
            text-align: center;
            background: #e7f3df;
            border-radius: 60px;
        }

        /* 自定义文件提示 */
        #file-name {
            color: #45753b;
            font-weight: 500;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #618b4c;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* 滚动条美颜 */
        .comment-list::-webkit-scrollbar {
            width: 8px;
        }
        .comment-list::-webkit-scrollbar-track {
            background: #ddecd2;
            border-radius: 12px;
        }
        .comment-list::-webkit-scrollbar-thumb {
            background: #80aa6b;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- 顶部圆形图片 — 完全按照要求: 安插在最顶部，圆形 -->
        <div class="avatar-wrapper">
            <img 
                class="avatar-circle" 
                alt="你的个人头像" 
                id="topAvatar"
                src="https://images.unsplash.com/photo-1536329583-40a8ea002c33?q=80&w=1974&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                onerror="this.onerror=null; this.src='https://api.dicebear.com/9.x/glass/svg?seed=creative&backgroundColor=b8d9a8&radius=50&scale=110'"
                style="width:130px; height:130px; border-radius:50%; object-fit:cover;"
            >
        </div>

        <h1>🌱 灵感·绿舍</h1>

        <!-- 白色方框里的核心：上传/评论区域 (本身已在白色卡内) -->
        <div class="upload-area">
            <div class="input-group">
                <label>📌 作品标题</label>
                <input type="text" class="input-field" id="workTitle" placeholder="例如：山谷回响 · 插画">
            </div>

            <div class="input-group">
                <label>💬 你的评论 / 创作描述</label>
                <textarea class="input-field" id="workDesc" placeholder="写下你对作品的感想或描述..."></textarea>
            </div>

            <div class="input-group">
                <label>📎 上传作品 (图片/文档)</label>
                <!-- 自定义上传按钮区 -->
                <div class="file-attach" onclick="document.getElementById('real-file-input').click();">
                    <span class="icon">⛁</span>
                    <span>点击选择文件</span>
                    <span id="file-name">未选择任何文件</span>
                </div>
                <input type="file" id="real-file-input" accept="image/*, .pdf, .doc, .docx, .txt">
            </div>

            <!-- 提交按钮 -->
            <button class="submit-btn" id="publishBtn">发布作品 & 评论</button>

            <!-- 评论陈列区 (白色方框内) -->
            <div class="comment-section">
                <h3>✨ 最新投稿</h3>
                <ul class="comment-list" id="commentList">
                    <!-- 预先填充两条示例，显得生动，符合方框内评论展示 -->
                    <li class="comment-item">
                        <div class="comment-avatar">🌿</div>
                        <div class="comment-content">
                            <span class="comment-title">林间晨雾</span>
                            <span class="comment-desc">水彩作品，尝试了湿画法，氛围很柔和~</span>
                            <div class="comment-meta">
                                <span>🗂️ 作品: morning_mist.jpg</span>
                                <span>💬 刚刚</span>
                            </div>
                        </div>
                    </li>
                    <li class="comment-item">
                        <div class="comment-avatar">🍃</div>
                        <div class="comment-content">
                            <span class="comment-title">青苔石阶</span>
                            <span class="comment-desc">用数码相机拍的院子角落，喜欢这种绿色。</span>
                            <div class="comment-meta">
                                <span>🗂️ moss_steps.png</span>
                                <span>💬 5分钟前</span>
                                                        </div>
                        </div>
                    </li>
                </ul>
                <!-- 空状态不显示，因为有示例数据。但将来动态插入会保留 -->
            </div>
            <footer>点击发布，你的作品也会出现在上面</footer>
        </div><!-- end upload-area -->
    </div><!-- end card -->

    <script>
        (function() {
            // 让图片显示更稳健：如果外部图片挂了，强制换为dicebear风格圆形图
            const avatarImg = document.getElementById('topAvatar');
            // 但已经通过onerror处理了。再补一个观察load，确保万一onerror没触发
            avatarImg.addEventListener('error', function(e) {
                e.target.src = 'https://api.dicebear.com/9.x/identicon/svg?seed=ArtGreen&radius=50&backgroundColor=a2cf8e';
            });

            // 显示选中文件名
            const fileInput = document.getElementById('real-file-input');
            const fileNameSpan = document.getElementById('file-name');
            fileInput.addEventListener('change', function(e) {
                if (fileInput.files.length > 0) {
                    fileNameSpan.textContent = fileInput.files[0].name;
                } else {
                    fileNameSpan.textContent = '未选择任何文件';
                }
            });

            // 发布功能: 获取标题、描述、文件名，添加到评论列表最上方
            const publishBtn = document.getElementById('publishBtn');
            const titleInput = document.getElementById('workTitle');
            const descTextarea = document.getElementById('workDesc');
            const commentList = document.getElementById('commentList');

            // 简单随机图标
            const icons = ['🌻', '🌸', '🍀', '🌿', '🎨', '🖌️', '📷', '🍂', '🌱', '🌟'];

            function addNewComment(title, desc, fileName) {
                if (!title.trim() && !desc.trim() && !fileName) {
                    alert('至少填写标题或评论，或者上传一个文件吧～');
                                    return false;
                }

                // 如果标题为空，使用默认标题
                const displayTitle = title.trim() ? title.trim() : '未命名作品';
                const displayDesc = desc.trim() ? desc.trim() : '✨ 一条没有描述的创作。';
                const fileDisplay = fileName ? fileName : '未附加文件';

                // 随机选择一个图标
                const randomIcon = icons[Math.floor(Math.random() * icons.length)];

                // 构造时间
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

                const newItem = document.createElement('li');
                newItem.className = 'comment-item';
                newItem.innerHTML = `
                    <div class="comment-avatar">${randomIcon}</div>
                    <div class="comment-content">
                        <span class="comment-title">${escapeHtml(displayTitle)}</span>
                        <span class="comment-desc">${escapeHtml(displayDesc)}</span>
                        <div class="comment-meta">
                            <span>🗂️ ${escapeHtml(fileDisplay)}</span>
                            <span>💬 刚刚 (${timeStr})</span>
                        </div>
                    </div>
                `;

                // 插入到列表最前面
                commentList.prepend(newItem);

                // 清除输入框（保留文件名显示，但不清除file input因为无法完全重置样式？可保留）
                titleInput.value = '';
                descTextarea.value = '';
                // 重置文件选择
                fileInput.value = '';
                fileNameSpan.textContent = '未选择任何文件';

                return true;
            }
                                return false;
                }

                // 如果标题为空，使用默认标题
                const displayTitle = title.trim() ? title.trim() : '未命名作品';
                const displayDesc = desc.trim() ? desc.trim() : '✨ 一条没有描述的创作。';
                const fileDisplay = fileName ? fileName : '未附加文件';

                // 随机选择一个图标
                const randomIcon = icons[Math.floor(Math.random() * icons.length)];

                // 构造时间
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

                const newItem = document.createElement('li');
                newItem.className = 'comment-item';
                newItem.innerHTML = `
                    <div class="comment-avatar">${randomIcon}</div>
                    <div class="comment-content">
                        <span class="comment-title">${escapeHtml(displayTitle)}</span>
                        <span class="comment-desc">${escapeHtml(displayDesc)}</span>
                        <div class="comment-meta">
                            <span>🗂️ ${escapeHtml(fileDisplay)}</span>
                            <span>💬 刚刚 (${timeStr})</span>
                        </div>
                    </div>
                `;

                // 插入到列表最前面
                commentList.prepend(newItem);

                // 清除输入框（保留文件名显示，但不清除file input因为无法完全重置样式？可保留）
                titleInput.value = '';
                descTextarea.value = '';
                // 重置文件选择
                fileInput.value = '';
                fileNameSpan.textContent = '未选择任何文件';

                return true;
            }
        }
                .card:hover {
            transform: perspective(2400px) rotateX(0.8deg) translateY(-8px);
            box-shadow: 0 40px 55px -15px #3b5e2b80, 0 80px 70px -30px #2f4d2b, 0 12px 30px -8px black;
        }
    </style>
    <!-- 额外修饰：伪影更深 -->
</body>
</html>
